# Dravr shared cargo-deny configuration
# Source: dravr-build-config/cargo/deny.toml

[advisories]
vulnerability = "deny"
unmaintained = "warn"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-wildcard-paths = true
allow = []
deny = []
skip = []
skip-tree = []

[licenses]
unlicensed = "deny"
default = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = ["https://github.com/dravr-ai/*"]
